<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512' width='512' height='512'>
  <defs>
    <!-- Pastel lavender-to-rose gradient background -->
    <linearGradient id='bg' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%'   stop-color='#c7d2fe'/>
      <stop offset='38%'  stop-color='#a5b4fc'/>
      <stop offset='72%'  stop-color='#f0abfc'/>
      <stop offset='100%' stop-color='#fda4af'/>
    </linearGradient>
    <!-- Subtle inner shine -->
    <radialGradient id='shine' cx='35%' cy='30%' r='55%'>
      <stop offset='0%'   stop-color='rgba(255,255,255,0.38)'/>
      <stop offset='100%' stop-color='rgba(255,255,255,0)'/>
    </radialGradient>
    <!-- White letter drop shadow -->
    <filter id='pshadow' x='-12%' y='-12%' width='130%' height='140%'>
      <feDropShadow dx='6' dy='10' stdDeviation='14' flood-color='#6d28d9' flood-opacity='0.28'/>
    </filter>
    <!-- Soft inner border glow -->
    <filter id='borderGlow' x='-2%' y='-2%' width='104%' height='104%'>
      <feGaussianBlur stdDeviation='3' result='blur'/>
      <feComposite in='SourceGraphic' in2='blur' operator='over'/>
    </filter>
  </defs>

  <!-- Rounded rect background -->
  <rect width='512' height='512' rx='108' fill='url(#bg)'/>
  <!-- Shine overlay -->
  <rect width='512' height='512' rx='108' fill='url(#shine)'/>
  <!-- Subtle white border inside -->
  <rect x='8' y='8' width='496' height='496' rx='102' fill='none'
        stroke='rgba(255,255,255,0.45)' stroke-width='7'/>

  <!-- Decorative accent dot cluster — top right -->
  <circle cx='382' cy='90' r='18' fill='rgba(255,255,255,0.22)'/>
  <circle cx='412' cy='72' r='10' fill='rgba(255,255,255,0.16)'/>
  <circle cx='358' cy='70' r='7'  fill='rgba(255,255,255,0.14)'/>

  <!-- Decorative accent — bottom left -->
  <circle cx='110' cy='428' r='22' fill='rgba(255,255,255,0.18)'/>
  <circle cx='84'  cy='454' r='12' fill='rgba(255,255,255,0.13)'/>

  <!-- The P — bold, offset left, tilted -8° -->
  <!-- Shifted: center at roughly (210, 268) instead of (256, 256) -->
  <g transform='rotate(-8, 210, 268)' filter='url(#pshadow)'>
    <!-- P stem -->
    <rect x='142' y='128' width='68' height='308' rx='34' fill='white'/>
    <!-- P bowl (right side bump) — two stacked rects + arc approximated with a path -->
    <path d='
      M 210 128
      L 210 128
      Q 360 128 360 218
      Q 360 308 210 308
      L 210 240
      Q 295 240 295 218
      Q 295 196 210 196
      Z
    ' fill='white'/>
  </g>

  <!-- Tiny wordmark at bottom — POSTLAIN in very small caps -->
  <text x='256' y='488' text-anchor='middle'
        font-family='Georgia, serif' font-weight='700' font-size='22'
        fill='rgba(255,255,255,0.65)' letter-spacing='6'>
    POSTLAIN
  </text>
</svg>
