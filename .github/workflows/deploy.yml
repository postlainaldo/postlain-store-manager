name: Deploy to Coolify

on:
  push:
    branches:
      - main

concurrency:
  group: coolify-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for any in-progress Coolify deploy to settle
        run: sleep 15

      - name: Trigger Coolify Deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "http://103.90.224.59:8000/api/v1/deploy?uuid=t14ce362eahwqnyahr2eypax&force=true"
